<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Qed — streaming LLM chat</title>
  <style>
    :root { color-scheme: light dark; --line: #8884; --user: #2563eb; --bot: #8882; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    #app { height: 100vh; }
    .chat { display: flex; flex-direction: column; height: 100vh; max-width: 44rem; margin: 0 auto; }
    .log {
      flex: 1; overflow-y: auto; padding: 1.25rem; display: flex;
      flex-direction: column; gap: .6rem;
    }
    .msg {
      padding: .55rem .8rem; border-radius: .9rem; max-width: 78%;
      line-height: 1.4; white-space: pre-wrap; word-break: break-word;
    }
    .msg.user { align-self: flex-end;   background: var(--user); color: #fff; border-bottom-right-radius: .2rem; }
    .msg.bot  { align-self: flex-start; background: var(--bot);  border-bottom-left-radius: .2rem; min-height: 1.4em; }
    .composer { display: flex; gap: .5rem; padding: .75rem 1rem; border-top: 1px solid var(--line); }
    .draft {
      flex: 1; padding: .6rem .8rem; border: 1px solid var(--line);
      border-radius: .6rem; background: transparent; color: inherit; font: inherit;
    }
    .send {
      padding: .6rem 1.1rem; border: 0; border-radius: .6rem; cursor: pointer;
      background: var(--user); color: #fff; font: inherit; font-weight: 600;
    }
    .send:disabled { opacity: .45; cursor: default; }
  </style>
</head>
<body>
  <div id="app">loading…</div>
  <script src="qed.js"></script>
  <script src="host.js"></script>
  <script>
    // `qed dev` live-reload (no-op in a static/test build).
    (function () {
      let last = null;
      setInterval(async () => {
        try {
          const r = await fetch('/__build_id', { cache: 'no-store' });
          if (!r.ok) return;
          const id = await r.text();
          if (last === null) last = id; else if (id !== last) location.reload();
        } catch (_) {}
      }, 600);
    })();
  </script>
</body>
</html>
